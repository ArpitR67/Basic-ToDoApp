<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App | Premium Dashboard</title>
    <!-- Load custom styles after base frame to ensure overrides take priority -->
    <link rel="stylesheet" href="/fanta.css" />
    <link rel="stylesheet" href="/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <!-- Toast notifications container -->
    <div class="toast-container" id="toastContainer"></div>

    <section id="auth">
      <div>
        <h2 class="sign-up-text">Login</h2>
        <p>Welcome back! Please enter your details.</p>
      </div>

      <p id="error" style="display: none"></p>
      <input id="emailInput" placeholder="Email (username)" type="email" />
      <input id="passwordInput" placeholder="Password (min 6 characters)" type="password" />
      <button id="authBtn" onclick="authenticate()">Submit</button>
      <hr />
      <div class="register-content">
        <p>Don't have an account?</p>
        <button onclick="toggleIsRegister()" id="registerBtn">Sign up</button>
      </div>
    </section>

    <header style="display: none">
      <div class="header-top">
        <h1 class="text-gradient">You have 0 tasks remaining.</h1>
        <div class="user-profile">
          <span class="user-badge" id="userBadge">User</span>
          <button onclick="logout()" class="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        </div>
      </div>
      <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </header>

    <nav style="display: none" class="tab-container">
      <button onclick="changeTab('All')" class="tab-button selected-tab">
        <h4>All <span>(0)</span></h4>
      </button>
      <button onclick="changeTab('Open')" class="tab-button">
        <h4>Open <span>(0)</span></h4>
      </button>
      <button onclick="changeTab('Complete')" class="tab-button">
        <h4>Complete <span>(0)</span></h4>
      </button>
    </nav>

    <main style="display: none"></main>
  </body>
  <script>
    let token = localStorage.getItem("token");

    let isLoading = false;
    let isAuthenticating = false;
    let isRegistration = false;
    let selectedTab = "All";
    let todos = [];

    const apiBase = "/";

    // elements
    const nav = document.querySelector("nav");
    const header = document.querySelector("header");
    const main = document.querySelector("main");
    const navElements = document.querySelectorAll(".tab-button");
    const authContent = document.getElementById("auth");
    const textError = document.getElementById("error");
    const email = document.getElementById("emailInput");
    const password = document.getElementById("passwordInput");
    const registerBtn = document.getElementById("registerBtn");
    const authBtn = document.getElementById("authBtn");
    const toastContainer = document.getElementById("toastContainer");

    // Toast notifications utility
    function showToast(message, type = "success") {
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      
      const icon = document.createElement("i");
      if (type === "success") {
        icon.className = "fa-solid fa-circle-check";
        icon.style.color = "var(--color-success)";
      } else {
        icon.className = "fa-solid fa-circle-exclamation";
        icon.style.color = "var(--color-danger)";
      }
      
      const text = document.createElement("span");
      text.innerText = message;
      
      toast.appendChild(icon);
      toast.appendChild(text);
      toastContainer.appendChild(toast);
      
      // Auto dismiss after 3 seconds
      setTimeout(() => {
        toast.style.animation = "fadeIn 0.3s ease-out reverse";
        setTimeout(() => {
          toast.remove();
        }, 300);
      }, 3000);
    }

    // PAGE RENDERING LOGIC
    async function showDashboard() {
      nav.style.display = "flex";
      header.style.display = "flex";
      main.style.display = "flex";
      authContent.style.display = "none";

      const storedUser = localStorage.getItem("username") || "User";
      document.getElementById("userBadge").innerText = storedUser.split("@")[0];

      await fetchTodos();
    }

    function updateHeaderStats() {
      const openTasksCount = todos.filter(val => !val.completed).length;
      const totalTasksCount = todos.length;
      
      const newString = openTasksCount === 1
          ? `1 task remaining.`
          : `${openTasksCount} tasks remaining.`;
      
      header.querySelector("h1").innerText = newString;

      // Update progress bar percentage
      const percent = totalTasksCount > 0 
          ? Math.round((todos.filter(val => val.completed).length / totalTasksCount) * 100) 
          : 0;
      document.getElementById("progressFill").style.width = percent + "%";
    }

    function updateNavCount() {
      navElements.forEach((ele) => {
        const btnText = ele.innerText.split(" ")[0];

        // filter todos in here
        const count = todos.filter((val) => {
          if (btnText === "All") {
            return true;
          }
          return btnText === "Complete" ? val.completed : !val.completed;
        }).length;

        // target inside space and update value
        ele.querySelector("span").innerText = `(${count})`;
      });
    }

    function changeTab(tab) {
      selectedTab = tab;
      navElements.forEach((val) => {
        if (val.innerText.includes(tab)) {
          val.classList.add("selected-tab");
        } else {
          val.classList.remove("selected-tab");
        }
      });
      renderTodos();
    }

    function renderTodos() {
      updateNavCount();
      updateHeaderStats();

      let todoList = ``;
      const filtered = todos.filter((val) => {
        return selectedTab === "All"
          ? true
          : selectedTab === "Complete"
          ? val.completed
          : !val.completed;
      });

      if (filtered.length === 0) {
        // Premium Empty State
        todoList += `
          <div class="empty-state">
              <i class="fa-solid fa-clipboard-list"></i>
              <h3>All caught up!</h3>
              <p>${
                selectedTab === "All"
                  ? "No tasks yet. Create one below to get organized."
                  : selectedTab === "Complete"
                  ? "No completed tasks yet. Go get things done!"
                  : "No pending tasks. Great job!"
              }</p>
          </div>
        `;
      } else {
        filtered.forEach((todo) => {
          const taskIndex = todo.id;
          todoList += `
            <div class="card todo-item ${todo.completed ? "todo-complete" : ""}">
                <p>${todo.task}</p>
                <div class="todo-buttons">
                    <button onclick="updateTodo(${taskIndex})" ${todo.completed ? "style='display: none;'" : ""}>
                        <i class="fa-solid fa-check"></i> Done
                    </button>
                    <button onclick="deleteTodo(${taskIndex})">
                        <i class="fa-solid fa-trash"></i> Delete
                    </button>
                </div>
            </div>
            `;
        });
      }

      todoList += `
        <div class="input-container">
            <input id="todoInput" placeholder="Add a new task..." onkeypress="handleKeyPress(event)" />
            <button onclick="addTodo()">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
        `;
      main.innerHTML = todoList;
    }

    function handleKeyPress(event) {
      if (event.key === "Enter") {
        addTodo();
      }
    }

    // AUTH LOGIC
    async function toggleIsRegister() {
      isRegistration = !isRegistration;
      registerBtn.innerText = isRegistration ? "Sign in" : "Sign up";
      document.querySelector("#auth > div h2").innerText = isRegistration
        ? "Sign Up"
        : "Login";
      document.querySelector("#auth > div p").innerText = isRegistration
        ? "Join us today! Enter your email and password."
        : "Welcome back! Please enter your details.";
      document.querySelector(".register-content p").innerText = isRegistration
        ? "Already have an account?"
        : "Don't have an account?";
      document.querySelector(".register-content button").innerText =
        isRegistration ? "Sign in" : "Sign up";
    }

    async function authenticate() {
      const emailVal = email.value.trim();
      const passVal = password.value;

      if (isLoading || isAuthenticating) return;

      if (!emailVal || !passVal) {
        showToast("Please fill in all fields", "error");
        return;
      }

      if (passVal.length < 6) {
        showToast("Password must be at least 6 characters", "error");
        return;
      }

      if (!emailVal.includes("@")) {
        showToast("Please enter a valid email address", "error");
        return;
      }

      textError.style.display = "none";
      isAuthenticating = true;
      authBtn.innerText = "Authenticating...";

      try {
        let data;
        let response;
        if (isRegistration) {
          response = await fetch(apiBase + "auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: emailVal, password: passVal }),
          });
        } else {
          response = await fetch(apiBase + "auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: emailVal, password: passVal }),
          });
        }

        if (response.status === 401) {
          throw new Error("Invalid username or password");
        } else if (response.status === 404) {
          throw new Error("User not found");
        } else if (!response.ok) {
          throw new Error("Authentication failed");
        }

        data = await response.json();

        if (data.token) {
          token = data.token;
          localStorage.setItem("token", token);
          localStorage.setItem("username", emailVal);

          authBtn.innerText = "Loading Dashboard...";
          showToast(isRegistration ? "Account created successfully!" : "Logged in successfully!");
          
          await showDashboard();
        } else {
          throw new Error("Authentication failed. No token received.");
        }
      } catch (err) {
        console.log(err.message);
        textError.innerText = err.message;
        textError.style.display = "block";
        showToast(err.message, "error");
      } finally {
        authBtn.innerText = "Submit";
        isAuthenticating = false;
      }
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("username");
      token = null;
      todos = [];
      
      // reset elements
      email.value = "";
      password.value = "";
      textError.style.display = "none";
      
      nav.style.display = "none";
      header.style.display = "none";
      main.style.display = "none";
      authContent.style.display = "flex";
      
      showToast("Logged out successfully");
    }

    // CRUD LOGIC
    async function fetchTodos() {
      if (!token) return;
      isLoading = true;
      try {
        const response = await fetch(apiBase + "todos", {
          headers: { Authorization: token },
        });
        if (!response.ok) {
          if (response.status === 401) {
            logout();
            return;
          }
          throw new Error("Failed to load tasks");
        }
        const todosData = await response.json();
        todos = todosData;
        renderTodos();
      } catch (err) {
        showToast(err.message, "error");
      } finally {
        isLoading = false;
      }
    }

    async function updateTodo(index) {
      try {
        const response = await fetch(apiBase + "todos" + "/" + index, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: token,
          },
          body: JSON.stringify({
            completed: 1,
          }),
        });
        if (!response.ok) throw new Error("Could not update task");
        showToast("Task completed! Keep it up.");
        fetchTodos();
      } catch (err) {
        showToast(err.message, "error");
      }
    }

    async function deleteTodo(index) {
      try {
        const response = await fetch(apiBase + "todos" + "/" + index, {
          method: "DELETE",
          headers: {
            Authorization: token,
          },
        });
        if (!response.ok) throw new Error("Could not delete task");
        showToast("Task deleted.");
        fetchTodos();
      } catch (err) {
        showToast(err.message, "error");
      }
    }

    async function addTodo() {
      const todoInput = document.getElementById("todoInput");
      if (!todoInput) return;
      const task = todoInput.value.trim();

      if (!task) {
        showToast("Task description cannot be empty", "error");
        return;
      }

      try {
        const response = await fetch(apiBase + "todos", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: token,
          },
          body: JSON.stringify({ task }),
        });
        if (!response.ok) throw new Error("Could not create task");
        todoInput.value = "";
        showToast("Task added successfully");
        fetchTodos();
      } catch (err) {
        showToast(err.message, "error");
      }
    }

    // Initialize application
    if (token) {
      showDashboard().catch((e) => {
        console.error(e);
        logout();
      });
    }
  </script>
</html>
